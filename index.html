<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Invite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5ddd5;
    }

    .header {
      background: #075E54;
      color: white;
      padding: 15px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header i {
      font-size: 22px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }

    .card {
      background: white;
      width: 350px;
      border-radius: 12px;
      text-align: center;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .group-icon {
      width: 100px;
      height: 100px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: auto;
      color: white;
      font-size: 40px;
    }

    h2 {
      margin: 15px 0 5px;
    }

    p {
      color: gray;
      margin-bottom: 20px;
    }

    .join-btn {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
    }

    .join-btn:hover {
      background: #1da851;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="header">
    <i class="fab fa-whatsapp"></i>
    WhatsApp
  </div>

  <div class="container">
    <div class="card">
      
      <div class="group-icon">
        <i class="fab fa-whatsapp"></i>
      </div>

      <h2>🏠 WORK FROM HOME</h2>
      <p>Join our WhatsApp group for daily earning tips & updates</p>

      <a href="https://bit.ly/4bNfKAw" class="join-btn">Join Chat</a>

      <div class="footer">
        Redirecting automatically...
      </div>

    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "https://bit.ly/4bNfKAw";
    }, 3000);
  </script>

</body>
</html>
